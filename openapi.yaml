openapi: 3.1.0
info:
  title: OnChainRisk API
  description: |
    **[⬇ Download OpenAPI spec (YAML)](/openapi.yaml)** — for codegen tools (openapi-generator, orval, etc.)

    ---

    Blockchain forensics and wallet risk analysis API. Analyze addresses, trace transactions, detect honeypot tokens, and investigate blockchain activity across 23 networks.

    ## Authentication

    Authenticate with an API key. Create keys in [API Keys](https://onchainrisk.io/dashboard/api-keys) (requires Pro plan or above).

    Send your key in the `Authorization` header:
    ```
    Authorization: Bearer ocr_live_...
    ```

    ## Rate Limits

    | Plan | Checks/month | AI Investigations/month | API Access |
    |------|-------------|------------------------|------------|
    | Free | 10/day | 3 | No |
    | Pro | 1,000 | 50 | Yes (10 req/s) |
    | Business | 5,000 | 200 | Yes (50 req/s) |
    | Enterprise | Unlimited | Unlimited | Yes (custom) |

    Cost per request:
    - `POST /api/v1/check` — 1 credit
    - `POST /api/v1/check/deep` — 1 credit
    - `POST /api/v1/token/check` — 1 credit (charged on save, not preview)
    - `POST /api/v1/block/analyze` — 1 credit (auto-saves report)
    - `POST /api/v1/multichain/scan` — **5 credits** (auto-saves report)

    Client-side idempotency is not currently supported. Repeated or
    concurrent successful requests may be billed separately. Avoid automatic
    retries unless the previous request failed before receiving a response.

    Rate limit headers are included in check responses:
    - `X-RateLimit-Limit` — Monthly limit
    - `X-RateLimit-Remaining` — Remaining checks
    - `X-Credits-Remaining` — Purchased credits remaining

    ## Validation errors

    Address validation runs before any blockchain scan. On failure the API
    returns **HTTP 422** (not 400) with the following stable envelope:

    ```json
    {
      "success": false,
      "error": {
        "message": "Validation failed",
        "code": "VALIDATION_ERROR",
        "details": {
          "address": "Address format does not match selected network. The address looks like a tron address, but network was set to eth.",
          "errorCode": "ADDRESS_NETWORK_MISMATCH",
          "detectedFamily": "tron",
          "requestedNetwork": "eth"
        }
      }
    }
    ```

    `error.code` is always `VALIDATION_ERROR` for this class. The granular
    reason lives in `error.details.errorCode`:

    | `errorCode`                   | When                                                                             |
    |-------------------------------|----------------------------------------------------------------------------------|
    | `INVALID_ADDRESS`             | empty, wrong format, whitespace-only                                             |
    | `UNSUPPORTED_NETWORK`         | `network` not in the supported list                                              |
    | `COULD_NOT_DETECT_NETWORK`    | address format unrecognised AND `network` omitted                                |
    | `INVALID_ADDRESS_CHECKSUM`    | decode succeeded, family checksum failed (Tron / BTC-legacy / LTC-legacy). Solana decode failures surface as `INVALID_ADDRESS` because Solana is not checksum-based. |
    | `ADDRESS_NETWORK_MISMATCH`    | detected address family inconsistent with requested `network`                    |

    `detectedFamily` and `requestedNetwork` are present only when they add
    useful diagnostic context; both may be `null` or absent.

    ## Supported Networks (23)

    | Network | Code | Type |
    |---------|------|------|
    | Ethereum | `eth` | Layer 1 |
    | BNB Smart Chain | `bsc` | Layer 1 |
    | Tron | `tron` | Layer 1 |
    | Bitcoin | `btc` | Layer 1 |
    | Solana | `sol` | Layer 1 |
    | TON | `ton` | Layer 1 |
    | Litecoin | `ltc` | Layer 1 |
    | Arbitrum | `arbitrum` | Layer 2 |
    | Optimism | `optimism` | Layer 2 |
    | Base | `base` | Layer 2 |
    | Polygon | `polygon` | Layer 2 |
    | Avalanche | `avalanche` | Layer 1 |
    | Linea | `linea` | Layer 2 |
    | zkSync Era | `zksync` | Layer 2 |
    | Scroll | `scroll` | Layer 2 |
    | Celo | `celo` | Layer 1 |
    | Cronos | `cronos` | Layer 1 |
    | Fantom | `fantom` | Layer 1 |
    | Moonbeam | `moonbeam` | Parachain |
    | Polygon zkEVM | `polygon_zkevm` | Layer 2 |
    | Cosmos | `cosmos` | Layer 1 |
    | Cardano | `cardano` | Layer 1 |
    | XRP | `xrp` | Layer 1 |

    ## Credits

    When monthly quota is exhausted, purchased credits are used automatically.
    - Check credits: 1 credit = 1 address/token/block analysis
    - AI credits: 1 credit = 1 AI investigation (separate pool)
    - Multi-chain full analysis: 5 check credits
    - Graph expansion: FREE (unlimited)

  version: 2.0.0
  contact:
    name: OnChainRisk Support
    url: https://onchainrisk.io/dashboard/support
    email: admin@onchainrisk.io

servers:
  - url: https://api.onchainrisk.io
    description: Production API

tags:
  - name: Analysis
    description: Address risk analysis, token check, block analysis
  - name: Multi-Chain
    description: Multi-chain wallet scan and full analysis
  - name: Reports
    description: Saved reports CRUD and graph state
  - name: Sharing
    description: Public share tokens for reports
  - name: Saved Reports
    description: Token / block / multichain report persistence
  - name: AI Investigation
    description: AI-powered blockchain investigation agent
  - name: Watchlist
    description: Address monitoring and alerts
  - name: Graph
    description: Counterparty expansion and CSV import
  - name: MEV
    description: MEV bot stats, aggregate metrics, manual scan trigger
  - name: Labels
    description: Custom address labels + bulk import/export
  - name: Notifications
    description: Notification channel preferences (email, Telegram, webhook)
  - name: Account
    description: User profile, usage, settings, branding, layout
  - name: Billing
    description: Plan upgrades, credit purchases, payment verification, refunds
  - name: Support
    description: Support ticket creation and tracking
  - name: API Keys
    description: API key management

paths:
  # ── Analysis ──────────────────────────────────────────
  /api/v1/check:
    post:
      tags: [Analysis]
      summary: Analyze address risk
      description: |
        Submit an address for full risk analysis. Returns risk score (0-100), pattern flags, counterparties, timing analysis, cross-chain activity, and more. Network is auto-detected from address format, or specify explicitly. Costs 1 check credit.

        **Sync vs async path.** Most addresses return a fully analysed report
        in a single 200 response. Heavy addresses (very high tx count, large
        smart contracts) take the async path: the API returns 202 with a
        `reportId` and the consumer worker fills in the analysis 1–5 minutes
        later. Poll `GET /api/v1/check/status/{reportId}` until `status` flips
        from `queued` / `analyzing` to `complete` (or `failed`).

        **Idempotent retries (30-min window).** If you POST again for the
        same `(api-key, address, network)` while a previous scan is still
        in flight, the API returns the existing in-flight `reportId` with
        `deduplicated: true`. No new charge, no new queue job. Useful for
        UI re-clicks and client-side retries.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  description: Wallet or contract address
                  example: "0x742d35CC6634C0532925a3b844bc454e4438F44e"
                network:
                  type: string
                  description: Network code (auto-detected if omitted)
                  enum: [eth, bsc, tron, btc, ltc, sol, ton, arbitrum, optimism, base, polygon, avalanche, linea, zksync, scroll, celo, cronos, fantom, moonbeam, polygon_zkevm, cosmos, cardano, xrp]
                  example: eth
      responses:
        '200':
          description: Analysis result (sync path)
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
        '202':
          description: |
            Async path — analysis queued. Poll the report endpoint for completion.
            Two variants:
              * **queued** — first time this address was submitted in the last 30 minutes.
              * **deduplicated** — the same (key, address, network) is already in flight; the existing reportId is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncQueuedResponse'
              examples:
                queued:
                  summary: First submission, queued for analysis
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: queued
                      async: true
                deduplicated:
                  summary: Idempotent retry within 30 minutes
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: queued
                      async: true
                      deduplicated: true
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          description: Rate limit exceeded
        '503':
          description: Analysis temporarily unavailable

  /api/v1/check/{address}:
    get:
      tags: [Analysis]
      summary: Fetch cached analysis (GET)
      description: |
        Returns a cached report for the address if one exists. Does not consume your quota. To force a fresh analysis (e.g. after new transactions), set `force=true` — this will call the analyzer and count as a new check. Add `?network=eth` to specify network.

        **Smart contracts:** when the address is a deployed contract, the response includes
        `contractAnalysis` (bytecode metadata) and may include `contractInfo` (proxy/deployment
        metadata). For very high-activity contracts (`addressInfo.txCount >= 50000`) the
        analyzer returns overview-only metadata and `dataCompleteness.partialReason` is set
        to `heavy_contract_overview`.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      parameters:
        - name: address
          in: path
          required: true
          schema: { type: string }
        - name: network
          in: query
          schema: { type: string }
        - name: force
          in: query
          description: Force fresh analysis instead of returning cache. Counts as a new check.
          schema: { type: boolean }
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisResult'
              examples:
                verifiedContract:
                  summary: Normal verified smart contract
                  description: |
                    Standard response for a verified contract with low transaction count.
                    `contractAnalysis` carries full bytecode metadata; `dataCompleteness` is
                    not partial.
                  value:
                    address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"
                    network: eth
                    riskScore: 5
                    riskLevel: low
                    addressInfo:
                      type: smart_contract
                      balance: "0 ETH"
                      txCount: 412
                      firstSeen: "2020-06-09T18:43:35Z"
                      lastSeen: "2026-04-25T10:11:02Z"
                    patternFlags: []
                    contractAnalysis:
                      contractName: "FiatTokenV2_2"
                      bytecodeSize: 24576
                      compilerVersion: "v0.6.12+commit.27d51765"
                      deployer: "0x95Ba4cF87D6723ad9C0Db21737D862bE80e93911"
                      isVerified: true
                      hasSelfdestruct: false
                      hasDelegatecall: true
                      hasCreate2: false
                      similarityFlags: ["ERC20", "Upgradeable"]
                      knownSignatures: ["transfer(address,uint256)", "approve(address,uint256)", "balanceOf(address)"]
                    contractInfo:
                      deployer: "0x95Ba4cF87D6723ad9C0Db21737D862bE80e93911"
                      creationTx: "0xe7e0fe390354509cd08c9a0168536938600ddc552b3f7cb96030ebef62e75895"
                      creationBlock: 6082465
                      isProxy: true
                      implementationAddress: "0xa2327a938Febf5FEC13baCFb16Ae10EcBc4cbDCF"
                      contractName: "FiatTokenV2_2"
                    dataCompleteness:
                      reportedTxCount: 412
                      fetchedTxCount: 412
                      completenessPct: 100
                      partialReason: null
                    analysisTime: 4321
                    timestamp: "2026-04-25T10:15:00Z"
                heavyContractOverview:
                  summary: Heavy contract — overview only
                  description: |
                    Response when `addressInfo.txCount >= 50000` and the analyzer returned a
                    minimal `contractAnalysis` shape. `dataCompleteness.partialReason` is
                    `heavy_contract_overview`. `similarityFlags` and `knownSignatures` are
                    still arrays (possibly empty) — the backend normalizes the shape so the
                    consumer never has to runtime-guard.
                  value:
                    address: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
                    network: eth
                    riskScore: null
                    riskLevel: low
                    addressInfo:
                      type: contract
                      balance: "0 ETH"
                      txCount: 267575
                      firstSeen: "2021-05-04T23:10:00Z"
                      lastSeen: "2026-04-25T09:55:21Z"
                    patternFlags: []
                    contractAnalysis:
                      contractName: null
                      bytecodeSize: 6177
                      compilerVersion: "v0.8.16+commit.07a7930e"
                      deployer: null
                      isVerified: true
                      hasSelfdestruct: false
                      hasDelegatecall: false
                      hasCreate2: false
                      similarityFlags: []
                      knownSignatures: []
                    dataCompleteness:
                      reportedTxCount: 267575
                      fetchedTxCount: 0
                      completenessPct: 0
                      partialReason: heavy_contract_overview
                    partialReason: heavy_contract_overview
                    analysisTime: 1820
                    timestamp: "2026-04-25T10:00:00Z"
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/check/status/{reportId}:
    get:
      tags: [Analysis]
      summary: Async scan status (polling)
      description: |
        Poll the status of an async scan that POST `/api/v1/check` returned with
        `async: true`. Lightweight: returns lifecycle status + risk summary
        once complete. Does NOT consume quota. Authenticated with the same
        API key that initiated the scan.

        **Lifecycle:**
          `queued` → `analyzing` → `complete` | `failed`

        Poll every 5 seconds until status is `complete` or `failed`. Typical
        end-to-end completion is 1–5 minutes for heavy addresses.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          description: The reportId returned by POST /api/v1/check (UUID).
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Current status and (when complete) risk summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanStatus'
              examples:
                queued:
                  summary: Just queued
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: queued
                      phase: null
                      errorMessage: null
                      riskScore: null
                      riskLevel: null
                      queuedAt: "2026-04-26T22:27:30Z"
                      startedAt: null
                      finishedAt: null
                analyzing:
                  summary: Consumer working on it
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: analyzing
                      phase: fetching_transactions
                      errorMessage: null
                      riskScore: null
                      riskLevel: null
                      queuedAt: "2026-04-26T22:27:30Z"
                      startedAt: "2026-04-26T22:27:35Z"
                      finishedAt: null
                complete:
                  summary: Done — full result available via GET /api/v1/check/{address}
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: complete
                      phase: null
                      errorMessage: null
                      riskScore: 5
                      riskLevel: low
                      queuedAt: "2026-04-26T22:27:30Z"
                      startedAt: "2026-04-26T22:27:35Z"
                      finishedAt: "2026-04-26T22:30:12Z"
                failed:
                  summary: Scan failed — error available
                  value:
                    success: true
                    data:
                      reportId: "98958045-d736-4bc4-90ed-a717a9258738"
                      status: failed
                      phase: null
                      errorMessage: "Upstream analysis timeout after 5 minutes"
                      riskScore: null
                      riskLevel: null
                      queuedAt: "2026-04-26T22:27:30Z"
                      startedAt: "2026-04-26T22:27:35Z"
                      finishedAt: "2026-04-26T22:32:35Z"
        '404':
          description: Report not found or not owned by this API key
        '401':
          description: Unauthorized

  /api/v1/check/deep:
    post:
      tags: [Analysis]
      summary: Deep analysis (peel chain detection)
      description: Trace transaction origin through intermediary wallets. Detects peel chains and fund splitting. Costs 1 check credit.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, network]
              properties:
                address: { type: string }
                network: { type: string }
                reportId: { type: string, description: "Attach result to existing report" }
      responses:
        '200':
          description: Peel chain result
          content:
            application/json:
              schema:
                type: object
                properties:
                  peelChain:
                    type: array
                    items:
                      type: object
                      properties:
                        address: { type: string }
                        label: { type: string, nullable: true }
                        riskLevel: { type: string }
                        depth: { type: integer }
        '422':
          $ref: '#/components/responses/ValidationFailed'
          # Includes deep-analysis-unsupported-network example
          # (`error.details.errorCode = DEEP_ANALYSIS_UNSUPPORTED_NETWORK`)
          # for permanent network gates. Pre-2026-05-15 these returned
          # 503 DEEP_ANALYSIS_UNAVAILABLE — fixed in Task #56.
        '503':
          description: |
            Transient upstream failure (timeout, Modal 5xx, network
            connectivity). Retry with backoff is appropriate. Permanent
            unsupported-network errors are 422, not 503 — see the
            `deep-analysis-unsupported-network` example above.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error:
                    type: object
                    properties:
                      message: { type: string }
                      code: { type: string, example: "DEEP_ANALYSIS_UNAVAILABLE" }

  /api/v1/token/check:
    post:
      tags: [Analysis]
      summary: Token security check (honeypot detection)
      description: |
        Analyze an ERC-20 token contract for honeypot risk, sell tax, blacklist functions, ownership concentration, and liquidity. Simulates buy/sell transactions. Costs 1 check credit.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, network]
              properties:
                address: { type: string, description: "Token contract address" }
                network:
                  type: string
                  enum: [eth, bsc, arbitrum, optimism, base, polygon, avalanche, linea, zksync]
                  description: |
                    Networks where token analysis is production-verified.
                    Other networks (scroll, celo, cronos, fantom, moonbeam,
                    polygon_zkevm, and non-EVM chains) return 422
                    NETWORK_NOT_SUPPORTED_FOR_TOKEN_CHECK.
      responses:
        '200':
          description: Token security analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  sections:
                    type: object
                    description: "Security checks: ownership, mint, fee, blacklist, proxy, liquidity, holders"
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/token/check/stream:
    post:
      tags: [Analysis]
      summary: Token check (SSE streaming)
      description: Same as `/api/v1/token/check` but returns results progressively via Server-Sent Events as each section completes.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, network]
              properties:
                address: { type: string }
                network: { type: string }
      responses:
        '200':
          description: SSE stream of section results
          content:
            text/event-stream: {}
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /api/v1/block/analyze:
    post:
      tags: [Analysis]
      summary: Block MEV analysis
      description: |
        Analyze all transactions in a block for MEV patterns: sandwich attacks, arbitrage, flash loans, JIT liquidity, and liquidations. **Costs 1 credit.** Auto-saves the block report; the response includes `reportPublicId` for retrieval via `GET /api/v1/block/reports/{id}`.

        Supported networks: `eth`, `arbitrum`, `optimism`, `avalanche`, `scroll`, `linea`, `zksync`, `bsc`, `polygon`, `base` — all 10 EVM block-analyze networks. Future block (block number greater than current chain tip) returns 404 `BLOCK_NOT_FOUND`. Generic upstream failures return 503 `BLOCK_ANALYZE_UNAVAILABLE`.

        Client-side idempotency is not currently supported. Repeated or concurrent successful requests may be billed separately.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blockNumber, network]
              properties:
                blockNumber: { type: integer, minimum: 0 }
                network:
                  type: string
                  enum: [eth, arbitrum, optimism, avalanche, scroll, linea, zksync, bsc, polygon, base]
                  description: |
                    All 10 EVM block-analyze networks are supported.
                    `bsc` and `polygon` were re-enabled 2026-05-05 (Phase 2b)
                    after the PoA / extended-extraData middleware fix.
                    `base` was re-enabled 2026-05-05 (Phase 2c) after the
                    Modal BASE_RPC_URL secret was rotated to the official
                    public Base RPC.
      responses:
        '200':
          description: Block analysis with MEV detection (auto-saved as a block report)
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: string, description: 'Stable UUID for the auto-saved block report. Same value as `reportPublicId`.' }
                  reportPublicId: { type: string, description: 'Stable UUID for the auto-saved block report.' }
                  cached: { type: boolean, description: 'True when the response was served from a 24h cache; the report still exists and is linked here.' }
                  blockNumber: { type: integer }
                  timestamp: { type: integer }
                  sandwiches: { type: array, items: { type: object } }
                  arbitrages: { type: array, items: { type: object } }

  # /api/v1/check/status/{id} — superseded by /api/v1/check/status/{reportId}
  # above (PR #48 / #48.1). Single canonical path; removed the stale
  # duplicate that used `processing` instead of `analyzing` in the enum.

  # Internal endpoints intentionally NOT documented here:
  # - /api/analyze/estimate — internal preflight; not exposed at
  #   api.onchainrisk.io (direct external calls 404).
  # - /api/v1/telemetry/archetype — dashboard client telemetry for AI archetype
  #   learning loop; not part of the public integration API.
  # - /api/admin/* — internal surface
  # - /api/notifications/telegram/callback — Telegram server-to-server webhook

  # ── Multi-Chain ───────────────────────────────────────
  /api/v1/multichain/scan:
    post:
      tags: [Multi-Chain]
      summary: Quick multi-chain scan
      description: |
        Scan one address across 15 EVM networks in parallel. Returns balances, transaction counts, and active chains. **Costs 5 credits.** Auto-saves the multi-chain report; the response includes `reportPublicId` for retrieval via `GET /api/v1/multichain/reports/{id}`.

        Client-side idempotency is not currently supported. Repeated or concurrent successful requests may be billed separately.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address: { type: string, description: "EVM address (0x...)" }
      responses:
        '200':
          description: Multi-chain scan result (auto-saved as a multi-chain report)
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: string, description: 'Stable UUID for the auto-saved multi-chain report. Same value as `reportPublicId`.' }
                  reportPublicId: { type: string, description: 'Stable UUID for the auto-saved multi-chain report.' }
                  cached: { type: boolean, description: 'True when served from the 5-min user-scoped cache; the linked report still exists.' }
                  address: { type: string }
                  activeChains: { type: integer }
                  totalChains: { type: integer }
                  chains: { type: array, items: { type: object } }
        '410':
          description: Cached scan exists but the original report was deleted, or legacy cache without a report link. Re-run the scan to create a fresh report.
        '429':
          description: Insufficient credits to spend the required 5 credits. Quota gate runs before any external scan, so no charge has occurred.

  /api/v1/multichain/analyze:
    post:
      tags: [Multi-Chain]
      summary: Full multi-chain risk analysis
      description: |
        Run full risk analysis on each active network. Background job with progress polling. Returns composite risk score and per-network breakdown. Costs 5 check credits.
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, networks]
              properties:
                address: { type: string }
                networks: { type: array, items: { type: string } }
      responses:
        '202':
          description: Analysis started
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: integer }
                  status: { type: string, enum: [analyzing] }
                  cost: { type: integer, example: 5 }
        '422':
          $ref: '#/components/responses/ValidationFailed'
          # Malformed JSON, null/non-object body, invalid address, or
          # empty/missing networks all return 422 VALIDATION_ERROR with
          # an explicit `error.details.body | address | networks` message.

  /api/v1/multichain/analyze/{reportId}:
    get:
      tags: [Multi-Chain]
      summary: Poll analysis progress
      security:
        - apiKeyAuth: []
        - apiKeyAuth: []
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Progress status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [analyzing, complete, failed] }
                  networks: { type: object }
                  compositeRiskScore: { type: integer }

  # ── Usage / quota introspection ───────────────────────
  /api/v1/usage:
    get:
      tags: [Account]
      summary: Get current API usage and quota
      description: |
        Read-only quota and usage state for the authenticated API key (or
        session). Use this to check remaining checks before scheduling a
        scan, or to surface quota in your own dashboard.

        Authentication accepts paid API keys, sandbox API keys (read-only
        introspection — sandbox cannot use other paid /api/v1/* compute
        endpoints), and browser session JWT.

        Quota semantics:
          - `plan_quota` is the recurring plan-included check quota.
            Paid plans (pro, business, enterprise) have a monthly window.
            Free has a rolling 24-hour window.
          - `purchased_credits.available` is the standalone credit balance,
            independent of `plan_quota.used`. Credits are consumed only
            after `plan_quota` is exhausted (or via `?source=credits`).
          - `rate_limit.requests_per_second` is throughput (per-plan tier),
            independent of `plan_quota`.
          - Enterprise plans return `plan_quota.limit = null` and
            `plan_quota.remaining = null` (unlimited). The internal
            sentinel value 999999 is never exposed.
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Current usage and quota
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    required: [plan, key_type, billing_period, plan_quota, purchased_credits, rate_limit]
                    properties:
                      plan:
                        type: string
                        enum: [free, pro, business, enterprise]
                        example: pro
                      key_type:
                        type: string
                        enum: [paid, sandbox]
                        nullable: true
                        description: Type of API key. `null` when authenticated via session JWT.
                        example: paid
                      billing_period:
                        type: object
                        required: [type, start, end]
                        properties:
                          type:
                            type: string
                            enum: [monthly, rolling_24h, none]
                            example: monthly
                          start:
                            type: string
                            format: date-time
                            nullable: true
                            description: ISO-8601 UTC. Null for `rolling_24h` and `none`.
                          end:
                            type: string
                            format: date-time
                            nullable: true
                            description: ISO-8601 UTC. Null for `rolling_24h` and `none`.
                      plan_quota:
                        type: object
                        required: [used, limit, remaining]
                        properties:
                          used:
                            type: integer
                            description: Plan quota checks consumed in current window.
                            example: 12
                          limit:
                            type: integer
                            nullable: true
                            description: Plan quota cap. `null` for enterprise (unlimited).
                            example: 1000
                          remaining:
                            type: integer
                            nullable: true
                            description: max(0, limit - used). `null` when limit is null.
                            example: 988
                      purchased_credits:
                        type: object
                        required: [available]
                        properties:
                          available:
                            type: integer
                            description: Standalone purchased-credit balance, separate from plan_quota.
                            example: 50
                      rate_limit:
                        type: object
                        required: [requests_per_second]
                        properties:
                          requests_per_second:
                            type: integer
                            description: Per-plan throughput cap.
                            example: 10
              examples:
                pro:
                  summary: Pro plan with 12 checks used and 50 purchased credits
                  value:
                    success: true
                    data:
                      plan: pro
                      key_type: paid
                      billing_period:
                        type: monthly
                        start: "2026-04-01T00:00:00.000Z"
                        end:   "2026-05-01T00:00:00.000Z"
                      plan_quota:
                        used: 12
                        limit: 1000
                        remaining: 988
                      purchased_credits:
                        available: 50
                      rate_limit:
                        requests_per_second: 10
                free:
                  summary: Free plan (rolling 24h window)
                  value:
                    success: true
                    data:
                      plan: free
                      key_type: null
                      billing_period:
                        type: rolling_24h
                        start: null
                        end:   null
                      plan_quota:
                        used: 3
                        limit: 10
                        remaining: 7
                      purchased_credits:
                        available: 0
                      rate_limit:
                        requests_per_second: 1
                enterprise:
                  summary: Enterprise plan (unlimited — no internal sentinel exposed)
                  value:
                    success: true
                    data:
                      plan: enterprise
                      key_type: paid
                      billing_period:
                        type: monthly
                        start: "2026-04-01T00:00:00.000Z"
                        end:   "2026-05-01T00:00:00.000Z"
                      plan_quota:
                        used: 4521
                        limit: null
                        remaining: null
                      purchased_credits:
                        available: 0
                      rate_limit:
                        requests_per_second: 100
        '401':
          description: Authentication required or invalid API key

  /api/v1/webhook/deliveries:
    get:
      tags: [Account]
      summary: List webhook delivery audit (#41 Phase 1)
      description: |
        Per-user webhook delivery audit, newest first. One row per
        `event_id`; status reflects current state across retries.

        Use this to debug "did my webhook actually arrive" — the row
        carries the result of every attempt path: 2xx delivered, 5xx/429
        scheduled retry, 4xx terminal failure, 410 disabled, network/TLS
        timeout retry.

        Privacy: response carries `endpoint_host` (hostname) only. Full
        webhook URL, secret, and request payload bytes are NEVER returned.
        Configure your webhook URL via `PATCH /api/notifications/settings`.

        Pagination: cursor-based on `id` (descending). When `next_cursor`
        is non-null, pass it back as `?cursor=<value>` for the next page.

        Authentication accepts paid API keys, sandbox API keys (read-only
        introspection), and browser session JWT.
      security:
        - apiKeyAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [delivering, delivered, retry_scheduled, failed, disabled]
          description: Filter to a single delivery status.
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Page size (default 20, max 100).
        - in: query
          name: cursor
          schema:
            type: string
          description: Pagination cursor returned by the previous page (`next_cursor`).
      responses:
        '200':
          description: Audit page
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    required: [deliveries, next_cursor]
                    properties:
                      deliveries:
                        type: array
                        items:
                          type: object
                          required: [event_id, event_type, status, attempts_count, endpoint_host, created_at, updated_at]
                          properties:
                            event_id:
                              type: string
                              example: wh_alert_12345_v1
                            event_type:
                              type: string
                              enum: [watchlist_alert, test]
                              example: watchlist_alert
                            alert_id:
                              type: integer
                              nullable: true
                              description: Linked watchlist_alert id; null for test deliveries.
                            endpoint_host:
                              type: string
                              description: Hostname of the configured receiver. Full URL never returned.
                              example: receiver.example.com
                            status:
                              type: string
                              enum: [delivering, delivered, retry_scheduled, failed, disabled]
                            attempts_count:
                              type: integer
                              minimum: 0
                              example: 1
                            next_retry_at:
                              type: string
                              format: date-time
                              nullable: true
                              description: ISO-8601 UTC. Non-null only when status=retry_scheduled.
                            last_attempt_at:
                              type: string
                              format: date-time
                              nullable: true
                              description: ISO-8601 UTC of most recent delivery attempt.
                            last_http_status:
                              type: integer
                              nullable: true
                              description: HTTP status from last attempt; null on network-level failure.
                              example: 200
                            last_error_class:
                              type: string
                              nullable: true
                              description: Error category (e.g. http_2xx, http_5xx, http_429, http_4xx_terminal, http_410_gone, AbortError, TypeError). Never carries response body.
                              example: http_2xx
                            delivered_at:
                              type: string
                              format: date-time
                              nullable: true
                              description: ISO-8601 UTC; set once on first 2xx, never cleared.
                            created_at:
                              type: string
                              format: date-time
                            updated_at:
                              type: string
                              format: date-time
                      next_cursor:
                        type: string
                        nullable: true
                        description: Pass to `?cursor=` for the next page; null when no more pages.
        '401':
          description: Authentication required or invalid API key
        '422':
          description: Invalid query parameter (e.g. unsupported status)

