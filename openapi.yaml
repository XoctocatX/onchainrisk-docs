              properties:
                blockNumber: { type: integer }
                network: { type: string }
                reportData: { type: object }
      responses:
        '201':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
    get:
      tags: [Saved Reports]
      summary: List saved block reports
      security:
        - apiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list

  /api/v1/multichain/reports:
    post:
      tags: [Saved Reports]
      summary: Save a multi-chain wallet report
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, reportData]
              properties:
                address: { type: string }
                reportData: { type: object }
      responses:
        '201':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
    get:
      tags: [Saved Reports]
      summary: List saved multi-chain reports
      security:
        - apiKeyAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list

  # ── MEV ───────────────────────────────────────────────
  /api/v1/mev/bots:
    get:
      tags: [MEV]
      summary: List known MEV bots and their recent stats
      security:
        - apiKeyAuth: []
      parameters:
        - name: network
          in: query
          schema: { type: string, default: eth }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
