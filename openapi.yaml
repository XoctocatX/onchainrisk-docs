  /api/v1/mev/stats:
    get:
      tags: [MEV]
      summary: Aggregate MEV statistics
      security:
        - apiKeyAuth: []
      parameters:
        - name: network
          in: query
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string, enum: [24h, 7d, 30d], default: 7d }
      responses:
        '200':
          description: Aggregate stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  network: { type: string }
                  period: { type: string }
                  totalSandwiches: { type: integer }
                  totalArbitrage: { type: integer }
                  totalFlashLoans: { type: integer }
