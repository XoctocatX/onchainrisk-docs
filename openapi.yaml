  # ── Graph ─────────────────────────────────────────────
  /api/graph/expand:
    post:
      tags: [Graph]
      summary: Expand graph counterparties for an address (one-hop)
      description: |
        Returns direct counterparties for the given address as nodes and
        edges to merge into the client graph.

        **One-hop per call.** Multi-hop workflows are built by iterative
        client-side calls (call this endpoint per node you want to expand).
        There is no single-call multi-hop traversal today.

        **Billing.** Calls are logged as `usage` action `graph_expand`.
        They do **not** decrement credits and do **not** count against the
        monthly `/api/v1/check` quota. Per-plan rate limits still apply.

        See `docs/integration/capability-matrix.md` for supported networks
        and plan rate limits.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address, network]
              properties:
                address: { type: string }
                network: { type: string }
      responses:
        '200':
          description: |
            Expanded subgraph. `nodes` and `edges` are aggregated per
            counterparty (one edge per `(target, counterparty)` pair).

            `partial`/`fetchedTxs`/`totalTxs` appear when the upstream
            transaction fetch hit its per-network cap — the response
            still contains the top counterparties by aggregate value,
            just not derived from the full history.
          content:
            application/json:
              schema:
                type: object
                required: [nodes, edges]
                properties:
                  nodes:
                    type: array
                    items: { $ref: '#/components/schemas/GraphNode' }
                  edges:
                    type: array
                    items: { $ref: '#/components/schemas/GraphEdge' }
                  partial:
                    type: boolean
                    description: |
                      True when upstream tx fetch hit a per-network cap.
                      Absent when the full history was scanned.
                  fetchedTxs:
                    type: integer
                    description: Transactions actually fetched from the upstream provider. Present only when `partial = true`.
                  totalTxs:
                    type: integer
                    description: Reported total transaction count for the address (best-effort, may be 0 if unknown). Present only when `partial = true`.

  /api/graph/csv-import:
    post:
      tags: [Graph]
      summary: Import CSV of transactions into a report graph
      description: Parses CSV (Etherscan-style export) and merges rows into the report's graph. Triggers full graph reboot in the UI.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportId, csv]
              properties:
                reportId: { type: string }
                csv: { type: string, description: "Raw CSV text" }
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  rowsParsed: { type: integer }
                  nodesAdded: { type: integer }
                  edgesAdded: { type: integer }
        '400': { description: CSV parse error }


  # ── Sharing (public) ──────────────────────────────────
  /api/share/{token}:
    get:
      tags: [Sharing]
      summary: Public report view by share token
      description: No authentication required. Returns the report if the share link is active and not expired.
      parameters:
