  /api/v1/mev/scan/trigger:
    post:
      tags: [MEV]
      summary: Trigger manual MEV scan for a network
      description: Kicks off the MEV aggregation cron job on demand. Rate-limited.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [network]
              properties:
