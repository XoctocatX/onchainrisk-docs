components:
  securitySchemes:
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key (create at https://onchainrisk.io/dashboard/api-keys)

  responses:
    ValidationFailed:
      description: |
        Address failed validation before any scan was performed. HTTP status
        is **422** with envelope `{ success: false, error: ErrorResponse }`.
        `error.details.errorCode` carries the granular reason.
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: false }
              error: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            address-network-mismatch:
              summary: Tron address submitted with network=eth
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address format does not match selected network. The address looks like a tron address, but network was set to eth."
                    errorCode: "ADDRESS_NETWORK_MISMATCH"
                    detectedFamily: "tron"
                    requestedNetwork: "eth"
            invalid-address:
              summary: Whitespace-only address
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address is required."
                    errorCode: "INVALID_ADDRESS"
            unsupported-network:
              summary: network=Ethereum (not in whitelist)
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Unsupported network 'ethereum'. Supported: arbitrum, avalanche, base, bsc, btc, cardano, celo, cosmos, cronos, eth, fantom, linea, ltc, moonbeam, optimism, polygon, polygon_zkevm, scroll, sol, ton, tron, xrp, zksync."
                    errorCode: "UNSUPPORTED_NETWORK"
                    requestedNetwork: "ethereum"
            could-not-detect-network:
              summary: Unrecognisable address, no network hint
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Could not detect network from address format. Please specify the network parameter."
                    errorCode: "COULD_NOT_DETECT_NETWORK"
            invalid-address-checksum:
              summary: Tron-shaped string with bad Base58Check
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address failed tron checksum validation."
                    errorCode: "INVALID_ADDRESS_CHECKSUM"
                    detectedFamily: "tron"
                    requestedNetwork: "tron"

  schemas:
    ErrorResponse:
      type: object
      description: |
        Stable error envelope for validation and business-rule failures.
        The shape mirrors the live Worker response:

        ```json
        { "success": false, "error": ErrorResponse }
        ```

        Required fields (`code` + `message`) are always populated; `details`
        carries structured diagnostic context and is present on validation
        failures. Clients should treat unknown fields as additive
        (no `additionalProperties: false`).
      required: [code, message]
      properties:
        code:
          type: string
          description: Outer envelope code. Always `VALIDATION_ERROR` for the validation family.
          enum:
            - VALIDATION_ERROR
        message:
          type: string
          description: Short, stable human-readable summary.
        details:
          type: object
          description: |
            Granular context. For validation failures the shape below is stable;
            for other error classes the Worker may return different keys.
          properties:
            address:
              type: string
              description: Human-readable reason specific to the failing address.
            errorCode:
              type: string
              description: |
                Granular validation reason. Stable machine-readable code.

                  - `INVALID_ADDRESS` — empty, wrong format, whitespace-only.
                  - `UNSUPPORTED_NETWORK` — `network` not in the supported list.
                  - `COULD_NOT_DETECT_NETWORK` — address format unrecognised and `network` omitted.
                  - `INVALID_ADDRESS_CHECKSUM` — decode succeeded, family checksum failed (Tron / BTC-legacy / LTC-legacy). Solana decode failures surface as `INVALID_ADDRESS` because Solana is not checksum-based.
                  - `ADDRESS_NETWORK_MISMATCH` — detected family inconsistent with requested `network`.
              enum:
                - INVALID_ADDRESS
                - UNSUPPORTED_NETWORK
                - COULD_NOT_DETECT_NETWORK
                - INVALID_ADDRESS_CHECKSUM
                - ADDRESS_NETWORK_MISMATCH
            detectedFamily:
              type: [string, 'null']
              description: |
                Address family detected from the input. Null when the format
                was unrecognisable. ENS names are resolved through a legacy
                path and are intentionally not part of the strict family
                contract documented here.
            requestedNetwork:
              type: [string, 'null']
              description: Normalized network string from the request, if any.

    AnalysisResult:
      type: object
      properties:
        address: { type: string }
        network: { type: string }
        riskScore: { type: integer, minimum: 0, maximum: 100, nullable: true, description: "Null while async scan is queued/analyzing." }
        riskLevel: { type: string, enum: [critical, high, medium, low], nullable: true }
        reportId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/ReportStatus'
        errorMessage:
          type: string
          nullable: true
          description: Populated when `status='failed'`.
        createdAt:
          type: string
          format: date-time
          description: Initial creation timestamp of this report row.
        addressInfo:
          type: object
          properties:
            type: { type: string, enum: [eoa, contract, smart_contract, unknown], description: "Address type. `contract` and `smart_contract` are aliases — both mean a deployed contract; clients should treat them equivalently." }
            balance: { type: string, example: "1.5 ETH" }
            balanceUsd: { type: number, nullable: true, example: 3045.50 }
            nativePriceUsd: { type: number, nullable: true, example: 2030.33 }
            txCount: { type: integer }
            firstSeen: { type: string, nullable: true }
            lastSeen: { type: string, nullable: true }
        patternFlags: { type: array, items: { type: string }, example: ["TRANSIT_WALLET", "KNOWN_MIXER"] }
        topCounterparties:
          type: array
          items:
            type: object
            properties:
              address: { type: string }
              label: { type: string, nullable: true }
              category: { $ref: '#/components/schemas/CategoryEnum' }
              txCount: { type: integer }
              totalValue: { type: string }
              inbound: { type: boolean }
        addressConnections:
          type: array
          description: |
            Aggregated counterparty category breakdown by total interaction volume (inbound + outbound)
            across up to 30 counterparties returned by the analyzer. Percentages rounded to 1 decimal,
            sum may be 99.0–101.0 due to rounding.
          items:
            $ref: '#/components/schemas/AddressConnection'
          example:
            - category: exchange
              percentage: 64.0
              valueFormatted: "15,000 TRX"
              valueRaw: "15000000000"
              unit: sun
            - category: sanctioned
              percentage: 23.9
              valueFormatted: "5,600 TRX"
              valueRaw: "5600000000"
              unit: sun
            - category: unknown
              percentage: 12.1
              valueFormatted: "2,835 TRX"
              valueRaw: "2835000000"
              unit: sun
        fundedBy:
          type: object
          nullable: true
          properties:
            address: { type: string }
            label: { type: string, nullable: true }
            txHash: { type: string }
            timestamp: { type: integer }
            value: { type: string }
        timing: { type: object, nullable: true }
        crossChain: { type: object, nullable: true }
        exchangeDeposits: { type: object, nullable: true }
        defiSwaps: { type: object, nullable: true }
        nftWashTrading: { type: object, nullable: true }
        osintIntelligence: { type: object, nullable: true }
        tokenFlow: { type: object, nullable: true }
        contractAnalysis:
          $ref: '#/components/schemas/ContractAnalysis'
        contractInfo:
          $ref: '#/components/schemas/ContractInfo'
        dataCompleteness:
          $ref: '#/components/schemas/DataCompleteness'
        honeypot: { type: object, nullable: true }
        railgun: { type: object, nullable: true }
        clusters: { type: object, nullable: true }
        usdPrices: { type: object, nullable: true }
        tokenTransferSupported: { type: boolean, nullable: true, description: "Whether token transfer data is available for this network" }
        tokenFlowIncomplete: { type: boolean, nullable: true, description: "True if token flow data is partial due to API failures" }
        walletArchetype: { type: string, nullable: true, enum: [automated, distribution, exchange_like, mev_like, unclassified], description: "SOL wallet behavior classification" }
        partialReason:
          type: string
          nullable: true
          enum: [timeout, limit_cap, limit_cap_assumed, api_error, btc_tx_count_exceeds_full_fetch_limit, ltc_tx_count_exceeds_full_fetch_limit, heavy_contract_overview]
          description: |
            Reason for partial transaction data. Mirrors `dataCompleteness.partialReason` for clients
            that only inspect the top level. `heavy_contract_overview` indicates the address is a
            deployed contract with `txCount >= 50000` and the analyzer returned bytecode-level
            metadata only — full transaction-level tracing is not available for this contract.
        analysisTime: { type: integer, description: "Milliseconds" }
        timestamp: { type: string, format: date-time }

    ReportStatus:
      type: string
      description: |
        Lifecycle of an async report:
          `queued`    — POST /check accepted; consumer worker has not picked it up yet.
          `analyzing` — consumer started; partial fields may exist.
          `complete`  — analysis written; full result available via GET /check/{address}.
          `failed`    — terminal error; `errorMessage` populated.
      enum: [queued, analyzing, complete, failed]

    AsyncQueuedResponse:
      type: object
      description: |
        202 response from POST /api/v1/check when the analysis takes the async
        path (heavy address). The reportId is stable across the in-flight window —
        a deduplicated retry returns the same id with `deduplicated: true`.
      required: [success, data]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [reportId, status, async]
          properties:
            reportId:
              type: string
              format: uuid
              description: Public id of the queued report. Use with /api/v1/check/status/{reportId}.
            status:
              type: string
              enum: [queued]
              description: Initial status — always `queued` at the 202 boundary.
            async:
              type: boolean
              enum: [true]
              description: Discriminator. Always true on this response.
            deduplicated:
              type: boolean
              description: |
                True when this 202 returned the existing in-flight report's id
                instead of creating a new one. Within a 30-minute window, repeat
                POSTs for the same `(api-key, address, network)` are idempotent
                and don't create new charges or queue jobs.

    ScanStatus:
      type: object
      description: |
        Polling response from GET /api/v1/check/status/{reportId}. Lightweight
        summary safe to poll every ~5 seconds. Once `status === 'complete'`,
        the full report is available via GET /api/v1/check/{address}.
      required: [reportId, status]
      properties:
        reportId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/ReportStatus'
        phase:
          type: string
          nullable: true
          description: |
            Free-form phase label set by the consumer worker while
            `status='analyzing'` (e.g. `fetching_transactions`). Cleared
            (`null`) on completion. Treat as observability hint, not API.
        errorMessage:
          type: string
          nullable: true
          description: Populated when `status='failed'`.
        riskScore:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Set when `status='complete'`. `null` otherwise.
        riskLevel:
          type: string
          nullable: true
          enum: [critical, high, medium, low]
        queuedAt:    { type: string, format: date-time, nullable: true }
        startedAt:   { type: string, format: date-time, nullable: true }
        finishedAt:  { type: string, format: date-time, nullable: true }

    ContractAnalysis:
      type: object
      nullable: true
      description: |
        Contract bytecode analysis. Returned for deployed contracts (`addressInfo.type` =
        `contract` or `smart_contract`); `null` for EOAs and addresses with no bytecode.

        **Stable shape contract** — `similarityFlags` and `knownSignatures` are always
        arrays (possibly empty). For heavy contracts (`txCount >= 50000`) the analyzer
        returns a minimal object with bytecode metadata only; backend normalizes the
        shape so consumers can rely on these fields existing without runtime guards.
      properties:
        contractName: { type: string, nullable: true, example: "Router" }
        bytecodeSize:
          type: integer
          nullable: true
          description: "Bytecode length in bytes. `null` when unknown — clients should render `Unknown`, never `0`."
          example: 6177
        compilerVersion: { type: string, nullable: true, example: "v0.8.16+commit.07a7930e" }
        deployer: { type: string, nullable: true, example: "0xabc..." }
        isVerified: { type: boolean, example: true }
        hasSelfdestruct: { type: boolean }
        hasDelegatecall: { type: boolean }
        hasCreate2: { type: boolean }
        similarityFlags:
          type: array
          items: { type: string }
          description: "Pattern matches against known exploit fingerprints. Empty array when none."
        knownSignatures:
          type: array
          items: { type: string }
          description: "Decoded function signatures recognized in bytecode. Empty array when none."

    ContractInfo:
      type: object
      nullable: true
      description: "Deployment + proxy metadata. Distinct from `contractAnalysis` (bytecode analysis)."
      properties:
        deployer: { type: string, nullable: true }
        creationTx: { type: string, nullable: true }
        creationBlock: { type: integer, nullable: true }
        isProxy:
          type: boolean
          description: "True when the contract is a proxy (EIP-1967 / minimal proxy / etc.) verified against on-chain implementation slot. Inferred-only fallbacks are NOT reflected here."
        implementationAddress: { type: string, nullable: true, description: "Set when `isProxy` is true and the implementation is resolvable." }
        contractName: { type: string, nullable: true }

    DataCompleteness:
      type: object
      nullable: true
      description: "Transaction fetch completeness signals. Drives partial-data UX and `heavy_contract_overview` marker."
      properties:
        reportedTxCount: { type: integer, description: "Total tx count as reported by chain stats / explorer." }
        fetchedTxCount: { type: integer, description: "Number of transactions actually parsed end-to-end." }
        completenessPct: { type: number, nullable: true, description: "100 × fetched / reported, rounded; `null` if reported is 0." }
        partialReason:
          type: string
          nullable: true
          enum: [timeout, limit_cap, limit_cap_assumed, api_error, btc_tx_count_exceeds_full_fetch_limit, ltc_tx_count_exceeds_full_fetch_limit, heavy_contract_overview]
          description: |
            Why the data is partial. `heavy_contract_overview` is set automatically when the
            address is a deployed contract with `txCount >= 50000` AND the analyzer returned
            a minimal contract metadata shape (bytecode only). UIs should show "overview only"
            copy in this case rather than treating absence of activity as no-activity.

    CategoryEnum:
      type: string
      description: Counterparty category from label database
      enum:
        - exchange
        - dex
        - defi
        - bridge
        - otc
        - mev_bot
        - instant_exchange
        - phishing
        - mixer
        - scam
        - exploit
        - sanctioned
        - frozen
        - custodian
        - fiat_ramp
        - payment_processor
        - unknown

    AddressConnection:
      type: object
      description: Aggregated interaction volume for a single counterparty category
      required: [category, percentage, valueFormatted, valueRaw, unit]
      properties:
        category:
          $ref: '#/components/schemas/CategoryEnum'
        percentage:
          type: number
          description: "Percentage of total interaction volume (0.0–100.0)"
          example: 64.0
        valueFormatted:
          type: string
          description: "Human-readable value with network unit (display-only)"
          example: "15,000 TRX"
        valueRaw:
          type: string
          description: "Raw value in network base units (wei, sun, satoshi, etc.) for programmatic use"
          example: "15000000000"
        unit:
          type: string
          description: "Base unit name for the network (wei, sun, satoshi, lovelace, etc.)"
          example: "sun"

    GraphSnapshot:
      type: object
      description: Graph snapshot metadata (no graphData payload)
      required: [id, reportId, name, nodeCount, edgeCount, createdAt, updatedAt]
      properties:
        id: { type: integer, example: 42 }
        reportId: { type: string, description: "Report public_id" }
        name: { type: string, maxLength: 100, example: "After expanding counterparties" }
        description: { type: string, nullable: true, maxLength: 500 }
        nodeCount: { type: integer, description: "Computed server-side from graphData.nodes" }
        edgeCount: { type: integer, description: "Computed server-side from graphData.edges" }
        createdAt: { type: integer, description: "Unix timestamp (seconds)" }
        updatedAt: { type: integer, description: "Unix timestamp (seconds)" }

    GraphSnapshotFull:
      allOf:
        - $ref: '#/components/schemas/GraphSnapshot'
        - type: object
          required: [graphData]
          properties:
            graphData:
              type: object
              required: [nodes, edges]
              properties:
                nodes: { type: array, items: { type: object } }
                edges: { type: array, items: { type: object } }
