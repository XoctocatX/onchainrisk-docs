  # ── Notifications ─────────────────────────────────────
  /api/notifications/settings:
    get:
      tags: [Notifications]
      summary: Get notification settings
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_enabled: { type: boolean }
                  telegram_enabled: { type: boolean }
                  telegram_chat_id: { type: [string, 'null'] }
                  webhook_url: { type: [string, 'null'] }
                  webhook_enabled: { type: boolean }
    patch:
      tags: [Notifications]
      summary: Update notification settings
      description: |
        Account-level notification configuration. Used by watchlist alert
        delivery (per-item `notify_email` / `notify_telegram` / `notify_webhook`
        flags decide which channels fire for that address).

        All fields are optional; PATCH semantics — provided fields are
        updated, omitted fields are preserved. Webhook delivery to the
        configured URL is signed with HMAC SHA-256 (`X-Signature-256` header)
        when `webhook_secret` is set. See `docs/integration/webhooks.md`.
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Partial update. All fields optional. The values returned by
                `GET /api/notifications/settings` mirror the persisted state.
              properties:
                email_enabled:
                  type: boolean
                  description: Email channel master toggle.
                telegram_chat_id:
                  type: [string, 'null']
                  description: |
                    Telegram chat ID (numeric string). Set after the user
                    completes the Telegram connect flow via the dashboard.
                    Pass `null` to clear.
                telegram_enabled:
                  type: boolean
                  description: Telegram channel master toggle.
                webhook_url:
                  type: [string, 'null']
                  format: uri
                  description: |
                    HTTPS endpoint that will receive watchlist alert POSTs.
                    Pass `null` to clear.
                webhook_secret:
                  type: [string, 'null']
                  description: |
                    Shared secret used to compute the `X-Signature-256` HMAC
                    header on outbound webhooks. Recommended ≥32 characters.
                    Pass `null` to clear (webhooks will then be sent unsigned).
                webhook_enabled:
                  type: boolean
                  description: Webhook channel master toggle.
                daily_digest:
                  type: boolean
                  description: |
                    Collapse email alerts into one daily summary. Webhooks
                    remain instant regardless of this flag.
      responses:
        '200': { description: Settings saved }

