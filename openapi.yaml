# ── Outbound webhook callbacks ──────────────────────────────────────────────
# OpenAPI 3.1 top-level `webhooks:` describes callbacks OnChainRisk sends
# OUT to customer-configured endpoints (registered via PATCH
# /api/notifications/settings). See docs/integration/webhooks.md for HMAC
# verification and delivery semantics (single-attempt today, ~5-min cadence).
webhooks:
  watchlistAlert:
    post:
      operationId: watchlistAlertWebhook
      # Outbound webhook — auth is HMAC SHA-256 (X-Signature-256), not the
      # apiKeyAuth scheme used by inbound endpoints. Empty list explicitly
      # opts out of root-level apiKeyAuth so codegen / lint don't expect it.
      security: []
      summary: Watchlist alert (outbound webhook)
      description: |
        Delivered to your configured `webhook_url` when a watchlist item
        sees a new on-chain transaction. Cron cadence ~5 minutes.

        **HMAC**: when `webhook_secret` is set, the `X-Signature-256` header
        contains `sha256=<hex>` over the raw request body bytes. Verify
        before processing — see docs/integration/webhooks.md for sample
        Node and Python verifiers.

        **Delivery semantics**: single attempt per alert today. If your
        endpoint is briefly unavailable the alert is logged on our side
        and not retried. Retries are roadmap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistAlertWebhookPayload'
      parameters:
        - in: header
          name: X-Signature-256
          required: false
          description: |
            HMAC SHA-256 of the raw request body, hex-encoded, prefixed
            with `sha256=`. Present only when `webhook_secret` was set
            via PATCH /api/notifications/settings. Strongly recommended
            to configure.
          schema:
            type: string
            example: "sha256=<hex_hmac_sha256_signature>"
      responses:
        '2xx':
          description: |
            Any 2xx response acknowledges receipt. We do not retry on
            non-2xx today (single-attempt delivery).

components:
  securitySchemes:
    apiKeyAuth:
      type: http
      scheme: bearer
      description: API key (create at https://onchainrisk.io/dashboard/api-keys)

  responses:
    ValidationFailed:
      description: |
        Address failed validation before any scan was performed. HTTP status
        is **422** with envelope `{ success: false, error: ErrorResponse }`.
        `error.details.errorCode` carries the granular reason.
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: false }
              error: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            address-network-mismatch:
              summary: Tron address submitted with network=eth
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address format does not match selected network. The address looks like a tron address, but network was set to eth."
                    errorCode: "ADDRESS_NETWORK_MISMATCH"
                    detectedFamily: "tron"
                    requestedNetwork: "eth"
            invalid-address:
              summary: Whitespace-only address
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address is required."
                    errorCode: "INVALID_ADDRESS"
            unsupported-network:
              summary: network=Ethereum (not in whitelist)
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Unsupported network 'ethereum'. Supported: arbitrum, avalanche, base, bsc, btc, cardano, celo, cosmos, cronos, eth, fantom, linea, ltc, moonbeam, optimism, polygon, polygon_zkevm, scroll, sol, ton, tron, xrp, zksync."
                    errorCode: "UNSUPPORTED_NETWORK"
                    requestedNetwork: "ethereum"
            deep-analysis-unsupported-network:
              summary: Deep analysis (peel chain) not available for this network
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    network: "Deep analysis not yet supported for TRON. Supported: ETH, Arbitrum, Optimism, Base, Polygon, Avalanche, Linea, zkSync Era, Scroll."
                    errorCode: "DEEP_ANALYSIS_UNSUPPORTED_NETWORK"
                    requestedNetwork: "tron"
            could-not-detect-network:
              summary: Unrecognisable address, no network hint
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Could not detect network from address format. Please specify the network parameter."
                    errorCode: "COULD_NOT_DETECT_NETWORK"
            invalid-address-checksum:
              summary: Tron-shaped string with bad Base58Check
              value:
                success: false
                error:
                  message: "Validation failed"
                  code: "VALIDATION_ERROR"
                  details:
                    address: "Address failed tron checksum validation."
                    errorCode: "INVALID_ADDRESS_CHECKSUM"
                    detectedFamily: "tron"
                    requestedNetwork: "tron"

  schemas:
    Coverage:
      type: object
      description: |
        Per-chain coverage disclosure block. Present on every report response
        regardless of stage — clients should NEVER need to special-case its absence.

        Stage taxonomy:
          - `ga`       — General Availability: full historical depth within stated window.
          - `rollout`  — Active migration / soak window. Coverage windows may temporarily vary.
          - `preview`  — Pre-v1: reports may have incomplete depth or gaps.
          - `degraded` — Known operational incident; see `warning` and `incident_url`.

        **Client integration requirement:** clients integrating OnChainRisk are
        REQUIRED to surface the `coverage.disclosure` field to end users when
        `stage != ga`. For `stage in [preview, degraded]`, clients MUST surface
        the `warning` field prominently.

        Canonical per-chain status matrix: see the `matrix_url` link.
      required: [stage, window, data_path, as_of, disclosure, matrix_url]
      properties:
        stage:
          type: string
          enum: [ga, rollout, preview, degraded]
          description: |
            Coverage maturity for this chain.
        window:
          type: [string, 'null']
          example: "30d"
          description: |
            Trailing coverage window (e.g. "30d", "90d"). May be `null` for
            chains in `preview` stage where no window is yet committed.
        data_path:
          type: string
          example: "self_hosted_nitro_clickhouse"
          description: |
            Production data path label (informational; not a user-facing
            commitment). Subject to change without notice within the stated stage.
        as_of:
          type: string
          format: date
          example: "2026-05-04"
          description: ISO date when this coverage status was last verified.
        disclosure:
          type: string
          description: |
            Disclosure text appropriate for this stage. Clients SHOULD surface
            this to end users when `stage != ga`. For `ga` chains, this is the
            standard methodology footer reference.
        warning:
          type: string
          description: |
            Strong warning text. Present (REQUIRED) when `stage in [preview, degraded]`.
            Clients MUST surface this prominently. Absent for `stage in [ga, rollout]`.
        incident_url:
          type: string
          format: uri
          description: |
            Incident status URL. May be present when `stage = degraded`.
        matrix_url:
          type: string
          format: uri
          example: "https://onchainrisk.io/coverage"
          description: |
            Public canonical coverage matrix page. UI pills and clients
            integrating OnChainRisk should link here for current per-chain status.
      example:
        stage: rollout
        window: "30d"
        data_path: self_hosted_nitro_clickhouse
        as_of: "2026-05-04"
        disclosure: "OnChainRisk's multi-chain coverage is in active rollout..."
        matrix_url: https://onchainrisk.io/coverage

    GraphNode:
      type: object
      description: |
        Counterparty node in the paid graph response. One node per
        unique counterparty address aggregated from the target's
        transaction history.
      required: [address, txCount]
      properties:
        address:
          type: string
          description: Counterparty address (case preserved per network — hex addresses returned in lowercase).
        label:
          type: [string, 'null']
          description: |
            Human-readable label from the OnChainRisk label database
            (exchange names, mixer/bridge tags, custom user labels, etc.)
            or `null` when no label matches.
        isTarget:
          type: boolean
          description: |
            Always `false` for counterparty nodes returned by this
            endpoint. Reserved for graph-rendering clients that may
            also represent the queried address as a node — the API
            does not currently emit a target node, but client code
            should treat unknown values defensively.
        totalValue:
          type: string
          description: |
            Aggregate native value across all transactions with this
            counterparty, formatted with the network's native unit
            (e.g. `"1.5 ETH"`, `"42 BNB"`, `"100 TRX"`). String to
            preserve precision across networks.
        txCount:
          type: integer
          minimum: 0
          description: Total transactions between target and this counterparty in the fetched history.
        tokens:
          type: array
          description: |
            Token symbols flowing through this counterparty (capped at
            the top-N by volume per the analyzer). May be empty when
            no token transfers were observed or the network has no
            token analyzer wired.
          items:
            type: string

    GraphEdge:
      type: object
      description: |
        Aggregated edge between target and one counterparty. Each
        `(target, counterparty)` pair produces exactly one edge —
        all transactions in the same direction-dominant flow are
        summed. Direction is inferred: edge points from the side
        that contributed more native value.
      required: [from, to, value, valueWei, txCount]
      properties:
        from:
          type: string
          description: Source address (target or counterparty depending on net flow direction).
        to:
          type: string
          description: Destination address.
        fromLabel:
          type: [string, 'null']
          description: Label of the `from` address (counterparty label when the counterparty was the sender; otherwise `null`).
        toLabel:
          type: [string, 'null']
          description: Label of the `to` address (counterparty label when the counterparty was the recipient; otherwise `null`).
        value:
          type: string
          description: Native value formatted with unit (e.g. `"1.5 ETH"`).
        valueWei:
          type: string
          description: |
            Native value in raw integer units (wei for EVM, sun for
            Tron, satoshi for BTC/LTC, lamports for SOL, etc.). String
            to preserve precision beyond JS Number range.
        txCount:
          type: integer
          minimum: 1
          description: Number of transactions aggregated into this edge.
        firstTx:
          type: integer
          description: |
            Unix timestamp (seconds) of the earliest transaction
            aggregated into this edge. May be `0` when the upstream
            analyzer was unable to determine — treat `0` as "unknown",
            not "epoch zero".
        lastTx:
          type: integer
          description: |
            Unix timestamp (seconds) of the latest transaction
            aggregated into this edge. Same `0`-as-unknown caveat as
            `firstTx`.
        tokenBreakdown:
          type: array
          description: |
            Per-token volume context for transactions on this edge.
            Common fields per item include `symbol` (string), `value`
            (string, formatted), and `txCount` (integer); additional
            per-network fields may be present. **Treat the item shape
            as open** — clients should defensively handle unknown
            properties and not assume a closed schema.
          items:
            type: object

    WatchlistAlertWebhookPayload:
      type: object
      description: |
        Body sent to a customer-configured webhook URL when a watchlist
        item sees a new transaction. Stable top-level fields are listed
        below; nested `data.*` fields evolve and clients should parse
        defensively (do not assume the shape is closed).
      required:
        - type
        - alert_id
        - address
        - network
      properties:
        type:
          type: string
          enum: [watchlist_alert]
          description: Webhook event type. Currently only `watchlist_alert`.
        alert_id:
          type: integer
          description: Stable per-alert ID; usable as idempotency key.
        watchlist_id:
          type: integer
          description: ID of the watchlist item that fired this alert.
        address:
          type: string
          description: The watched address.
        network:
          type: string
          description: Network identifier (e.g. `eth`, `bsc`, `tron`).
        alert_type:
          type: [string, 'null']
          description: |
            High-level alert category. Examples seen in production:
            `incoming`, `outgoing`, `balance_change`. Treat as
            open-ended — new types may be added without spec bump.
        tx_hash:
          type: [string, 'null']
          description: Transaction hash (when applicable).
        explorer_url:
          type: [string, 'null']
          format: uri
          description: Pre-built explorer link for the transaction.
        value:
          type: [string, 'null']
          description: Native value, formatted as a string for precision.
        timestamp:
          type: [integer, 'null']
          description: Unix seconds when the alert was emitted.
        data:
          type: object
          description: |
            Nested context object — fields evolve. Currently includes
            denormalized copies of `tx_hash`, `explorer_url`, `network`,
            `address`, plus a `tx` sub-object for transaction details
            and `alertType`. Parse defensively.
      example:
        type: watchlist_alert
        alert_id: 12345
        watchlist_id: 678
        address: "0xYourAddress"
        network: eth
        alert_type: incoming
        tx_hash: "0xabc123..."
        explorer_url: "https://etherscan.io/tx/0xabc123..."
        value: "1.234"
        timestamp: 1777800000
        data:
          address: "0xYourAddress"
          network: eth
          alertType: incoming
          tx:
            hash: "0xabc123..."
            value: "1.234"
            from: "0xSender..."
            to: "0xYourAddress"
          tx_hash: "0xabc123..."
          explorer_url: "https://etherscan.io/tx/0xabc123..."

    ErrorResponse:
      type: object
      description: |
        Stable error envelope for validation and business-rule failures.
        The shape mirrors the live API response:

        ```json
        { "success": false, "error": ErrorResponse }
        ```

        Required fields (`code` + `message`) are always populated; `details`
        carries structured diagnostic context and is present on validation
        failures. Clients should treat unknown fields as additive
        (no `additionalProperties: false`).
      required: [code, message]
      properties:
        code:
          type: string
          description: Outer envelope code. Always `VALIDATION_ERROR` for the validation family.
          enum:
            - VALIDATION_ERROR
        message:
          type: string
          description: Short, stable human-readable summary.
        details:
          type: object
          description: |
            Granular context. For validation failures the shape below is stable;
            for other error classes the API may return different keys.
          properties:
            address:
              type: string
              description: Human-readable reason specific to the failing address.
            errorCode:
              type: string
              description: |
                Granular validation reason. Stable machine-readable code.

                  - `INVALID_ADDRESS` — empty, wrong format, whitespace-only.
                  - `UNSUPPORTED_NETWORK` — `network` not in the supported list.
                  - `COULD_NOT_DETECT_NETWORK` — address format unrecognised and `network` omitted.
                  - `INVALID_ADDRESS_CHECKSUM` — decode succeeded, family checksum failed (Tron / BTC-legacy / LTC-legacy). Solana decode failures surface as `INVALID_ADDRESS` because Solana is not checksum-based.
                  - `ADDRESS_NETWORK_MISMATCH` — detected family inconsistent with requested `network`.
              enum:
                - INVALID_ADDRESS
                - UNSUPPORTED_NETWORK
                - COULD_NOT_DETECT_NETWORK
                - INVALID_ADDRESS_CHECKSUM
                - ADDRESS_NETWORK_MISMATCH
            detectedFamily:
              type: [string, 'null']
              description: |
                Address family detected from the input. Null when the format
                was unrecognisable. ENS names are resolved through a legacy
                path and are intentionally not part of the strict family
                contract documented here.
            requestedNetwork:
              type: [string, 'null']
              description: Normalized network string from the request, if any.

    AnalysisResult:
      type: object
      properties:
        address: { type: string }
        network: { type: string }
        riskScore: { type: integer, minimum: 0, maximum: 100, nullable: true, description: "Null while async scan is queued/analyzing." }
        riskLevel: { type: string, enum: [critical, high, medium, low], nullable: true }
        riskContributions:
          type: object
          nullable: true
          additionalProperties:
            type: integer
            minimum: 0
            maximum: 100
          description: |
            Per-component risk contribution scores, 0-100. Keys are the
            seven scorer components (mixer_interaction, sanctioned_contact,
            behavioral_patterns, counterparty_risk, timing_anomalies,
            contract_risk, fund_flow_topology). Null on pre-explainability
            Modal versions. Honest invariant:
              base_score ≈ round(Σ riskContributions[k] × riskWeights[k])
            The final `riskScore` may still be higher than base_score
            because critical override floors (sanctioned, exploit, frozen,
            mixer, transit_massive, ...) are applied separately. Surfacing
            which floor fired is planned for a future PR.
        riskWeights:
          type: object
          nullable: true
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
          description: |
            Effective per-component weights actually used for THIS scoring
            run, after custom_weights validation/normalization and EOA
            redistribution (contract_risk → 0, redistributed across
            mixer/sanctioned/behavioral). NOT the static module-default
            weights. Sum of values is 1.0 (within float tolerance).
            Keys are the same seven components as `riskContributions` so
            the two maps can be zipped client-side. Null on pre-
            explainability Modal versions.
        riskConfidence:
          type: string
          enum: [high, medium, low]
          description: |
            Confidence in the reported `riskScore` based on data
            completeness. **Behavior change**: this enum was previously
            `[high, low]` and now includes `medium`. Tier semantics:
              - `high`: fully complete tx fetch, exact funded_by, no
                token-flow extraction crash, no coverage downgrade.
              - `medium`: partial-but-substantial data
                (`completeness_pct ≥ 60`), or any tx-count coverage
                downgrade (approximate / subset_only / unknown), or
                `token_flow_incomplete`, or `funded_by_status` in
                {approximate, unavailable}.
              - `low`: `riskScore` was nulled due to low completeness,
                or provider returned `api_error`, or partial-fetch with
                `completeness_pct < 60` (or unknown).
            See `riskConfidenceDetails` for the specific reasons that
            drove the tier on this particular response.
        riskConfidenceDetails:
          type: object
          nullable: true
          description: |
            Structured explanation of why a particular `riskConfidence`
            tier was selected. Null on pre-explainability Modal versions
            (in that case `riskConfidence` is still emitted with a tier
            value, just without the breakdown).
          properties:
            tier:
              type: string
              enum: [high, medium, low]
              description: Same value as `riskConfidence`.
            completeness_pct:
              type: number
              nullable: true
              minimum: 0
              maximum: 100
              description: |
                Fraction of reported transaction history actually
                fetched. Null when the upstream provider doesn't expose
                a reliable total (some non-EVM chains).
            reasons:
              type: array
              items:
                type: string
                enum:
                  - tx_count_coverage_subset
                  - tx_count_coverage_approximate
                  - tx_count_coverage_unknown
                  - tx_fetch_incomplete_limit_cap
                  - tx_fetch_incomplete_api_error
                  - token_flow_incomplete
                  - funded_by_approximate
                  - funded_by_unavailable
                  - score_unavailable_low_completeness
              description: |
                Public-contract identifiers for each completeness signal
                that contributed to the tier. Order is deterministic
                (alphabetical) and the list is deduplicated. Empty when
                tier is `high`. A `low` tier may include medium-level
                reasons too — clients should render the full list rather
                than only the most-severe entry.
        reportId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/ReportStatus'
        errorMessage:
          type: string
          nullable: true
          description: Populated when `status='failed'`.
        createdAt:
          type: string
          format: date-time
          description: Initial creation timestamp of this report row.
        addressInfo:
          type: object
          properties:
            type: { type: string, enum: [eoa, contract, smart_contract, unknown], description: "Address type. `contract` and `smart_contract` are aliases — both mean a deployed contract; clients should treat them equivalently." }
            balance: { type: string, example: "1.5 ETH" }
            balanceUsd: { type: number, nullable: true, example: 3045.50 }
            nativePriceUsd: { type: number, nullable: true, example: 2030.33 }
            txCount: { type: integer }
            firstSeen: { type: string, nullable: true }
            lastSeen: { type: string, nullable: true }
        patternFlags:
          type: array
          items: { type: string }
          description: |
            Legacy display strings, kept for backward compatibility. For
            localization use `code` / `templateKey` from `patternFlagDetails`
            (index-aligned with this array).
          example: ["BULK COLLECTION pattern: 24 inbound TXs in 600s", "OFAC/sanctions list match"]
        patternFlagDetails:
          type: array
          description: |
            Localization-friendly metadata, index-aligned with `patternFlags`.
            Use `code` / `templateKey` for translation/mapping. `defaultEn` is
            a display fallback only (may include dynamic values; not stable
            across releases).
          items:
            $ref: '#/components/schemas/FlagDetail'
          example:
            - code: bulk_collection
              templateKey: pattern.bulk_collection
              defaultEn: "BULK COLLECTION pattern: 24 inbound TXs in 600s"
              severity: medium
              description: "Many sources sent funds within a short window (bulk collection)."
            - code: ofac_sanctions_match
              templateKey: pattern.ofac_sanctions_match
              defaultEn: "OFAC/sanctions list match"
              severity: critical
              description: "Address matches an OFAC/sanctions list."
        topCounterparties:
          type: array
          items:
            type: object
            properties:
              address: { type: string }
              label: { type: string, nullable: true }
              category: { $ref: '#/components/schemas/CategoryEnum' }
              txCount: { type: integer }
              totalValue: { type: string }
              inbound: { type: boolean }
        addressConnections:
          type: array
          description: |
            Aggregated counterparty category breakdown by total interaction volume (inbound + outbound)
            across up to 30 counterparties returned by the analyzer. Percentages rounded to 1 decimal,
            sum may be 99.0–101.0 due to rounding.
          items:
            $ref: '#/components/schemas/AddressConnection'
          example:
            - category: exchange
              percentage: 64.0
              valueFormatted: "15,000 TRX"
              valueRaw: "15000000000"
              unit: sun
            - category: sanctioned
              percentage: 23.9
              valueFormatted: "5,600 TRX"
              valueRaw: "5600000000"
              unit: sun
            - category: unknown
              percentage: 12.1
              valueFormatted: "2,835 TRX"
              valueRaw: "2835000000"
              unit: sun
        fundedBy:
          type: object
          nullable: true
          properties:
            address: { type: string }
            label: { type: string, nullable: true }
            txHash: { type: string }
            timestamp: { type: integer }
            value: { type: string }
        timing:
          type: object
          nullable: true
          description: |
            Transaction timing analysis. Includes legacy `botFlags` (display
            strings) and `botFlagDetails` (localization-friendly metadata,
            index-aligned with `botFlags`). Other fields (hourly/daily
            distribution, regularityScore, etc.) are returned as-is from
            the analyzer.
          properties:
            botFlags:
              type: array
              items: { type: string }
              description: Legacy display strings, kept for backward compatibility. For localization use `code` / `templateKey` from `botFlagDetails`.
              example: ["Active across 22+ hours daily — likely automated"]
            botFlagDetails:
              type: array
              description: Localization-friendly metadata, index-aligned with `botFlags`.
              items:
                $ref: '#/components/schemas/FlagDetail'
              example:
                - code: always_on_24h
                  templateKey: bot.always_on_24h
                  defaultEn: "Active across 22+ hours daily — likely automated"
                  severity: medium
                  description: "Address is active for ~22+ hours per day, suggesting automation."
        crossChain: { type: object, nullable: true }
        exchangeDeposits: { type: object, nullable: true }
        defiSwaps: { type: object, nullable: true }
        nftWashTrading: { type: object, nullable: true }
        osintIntelligence: { type: object, nullable: true }
        tokenFlow: { type: object, nullable: true }
        contractAnalysis:
          $ref: '#/components/schemas/ContractAnalysis'
        contractInfo:
          $ref: '#/components/schemas/ContractInfo'
        dataCompleteness:
          $ref: '#/components/schemas/DataCompleteness'
        honeypot: { type: object, nullable: true }
        railgun: { type: object, nullable: true }
        clusters: { type: object, nullable: true }
        usdPrices: { type: object, nullable: true }
        tokenTransferSupported: { type: boolean, nullable: true, description: "Whether token transfer data is available for this network" }
        tokenFlowIncomplete: { type: boolean, nullable: true, description: "True if token flow data is partial due to API failures" }
        walletArchetype: { type: string, nullable: true, enum: [automated, distribution, exchange_like, mev_like, unclassified], description: "SOL wallet behavior classification" }
        partialReason:
          type: string
          nullable: true
          enum: [timeout, limit_cap, limit_cap_assumed, api_error, btc_tx_count_exceeds_full_fetch_limit, ltc_tx_count_exceeds_full_fetch_limit, heavy_contract_overview]
          description: |
            Reason for partial transaction data. Mirrors `dataCompleteness.partialReason` for clients
            that only inspect the top level. `heavy_contract_overview` indicates the address is a
            deployed contract with `txCount >= 50000` and the analyzer returned bytecode-level
            metadata only — full transaction-level tracing is not available for this contract.
        analysisTime: { type: integer, description: "Milliseconds" }
        timestamp: { type: string, format: date-time }

    ReportStatus:
      type: string
      description: |
        Lifecycle of an async report:
          `queued`    — POST /check accepted; consumer worker has not picked it up yet.
          `analyzing` — consumer started; partial fields may exist.
          `complete`  — analysis written; full result available via GET /check/{address}.
          `failed`    — terminal error; `errorMessage` populated.
      enum: [queued, analyzing, complete, failed]

    AsyncQueuedResponse:
      type: object
      description: |
        202 response from POST /api/v1/check when the analysis takes the async
        path (heavy address). The reportId is stable across the in-flight window —
        a deduplicated retry returns the same id with `deduplicated: true`.
      required: [success, data]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          required: [reportId, status, async]
          properties:
            reportId:
              type: string
              format: uuid
              description: Public id of the queued report. Use with /api/v1/check/status/{reportId}.
            status:
              type: string
              enum: [queued]
              description: Initial status — always `queued` at the 202 boundary.
            async:
              type: boolean
              enum: [true]
              description: Discriminator. Always true on this response.
            deduplicated:
              type: boolean
              description: |
                True when this 202 returned the existing in-flight report's id
                instead of creating a new one. Within a 30-minute window, repeat
                POSTs for the same `(api-key, address, network)` are idempotent
                and don't create new charges or queue jobs.

    ScanStatus:
      type: object
      description: |
        Polling response from GET /api/v1/check/status/{reportId}. Lightweight
        summary safe to poll every ~5 seconds. Once `status === 'complete'`,
        the full report is available via GET /api/v1/check/{address}.
      required: [reportId, status]
      properties:
        reportId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/ReportStatus'
        phase:
          type: string
          nullable: true
          description: |
            Free-form phase label set by the consumer worker while
            `status='analyzing'` (e.g. `fetching_transactions`). Cleared
            (`null`) on completion. Treat as observability hint, not API.
        errorMessage:
          type: string
          nullable: true
          description: Populated when `status='failed'`.
        riskScore:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Set when `status='complete'`. `null` otherwise.
        riskLevel:
          type: string
          nullable: true
          enum: [critical, high, medium, low]
        queuedAt:    { type: string, format: date-time, nullable: true }
        startedAt:   { type: string, format: date-time, nullable: true }
        finishedAt:  { type: string, format: date-time, nullable: true }

    ContractAnalysis:
      type: object
      nullable: true
      description: |
        Contract bytecode analysis. Returned for deployed contracts (`addressInfo.type` =
        `contract` or `smart_contract`); `null` for EOAs and addresses with no bytecode.

        **Stable shape contract** — `similarityFlags` and `knownSignatures` are always
        arrays (possibly empty). For heavy contracts (`txCount >= 50000`) the analyzer
        returns a minimal object with bytecode metadata only; backend normalizes the
        shape so consumers can rely on these fields existing without runtime guards.
      properties:
        contractName: { type: string, nullable: true, example: "Router" }
        bytecodeSize:
          type: integer
          nullable: true
          description: "Bytecode length in bytes. `null` when unknown — clients should render `Unknown`, never `0`."
          example: 6177
        compilerVersion: { type: string, nullable: true, example: "v0.8.16+commit.07a7930e" }
        deployer: { type: string, nullable: true, example: "0xabc..." }
        isVerified: { type: boolean, example: true }
        hasSelfdestruct: { type: boolean }
        hasDelegatecall: { type: boolean }
        hasCreate2: { type: boolean }
        similarityFlags:
          type: array
          items: { type: string }
          description: "Pattern matches against known exploit fingerprints. Empty array when none."
        knownSignatures:
          type: array
          items: { type: string }
          description: "Decoded function signatures recognized in bytecode. Empty array when none."

    ContractInfo:
      type: object
      nullable: true
      description: "Deployment + proxy metadata. Distinct from `contractAnalysis` (bytecode analysis)."
      properties:
        deployer: { type: string, nullable: true }
        creationTx: { type: string, nullable: true }
        creationBlock: { type: integer, nullable: true }
        isProxy:
          type: boolean
          description: "True when the contract is a proxy (EIP-1967 / minimal proxy / etc.) verified against on-chain implementation slot. Inferred-only fallbacks are NOT reflected here."
        implementationAddress: { type: string, nullable: true, description: "Set when `isProxy` is true and the implementation is resolvable." }
        contractName: { type: string, nullable: true }

    DataCompleteness:
      type: object
      nullable: true
      description: "Transaction fetch completeness signals. Drives partial-data UX and `heavy_contract_overview` marker."
      properties:
        reportedTxCount: { type: integer, description: "Total tx count as reported by chain stats / explorer." }
        fetchedTxCount: { type: integer, description: "Number of transactions actually parsed end-to-end." }
        completenessPct: { type: number, nullable: true, description: "100 × fetched / reported, rounded; `null` if reported is 0." }
        partialReason:
          type: string
          nullable: true
          enum: [timeout, limit_cap, limit_cap_assumed, api_error, btc_tx_count_exceeds_full_fetch_limit, ltc_tx_count_exceeds_full_fetch_limit, heavy_contract_overview]
          description: |
            Why the data is partial. `heavy_contract_overview` is set automatically when the
            address is a deployed contract with `txCount >= 50000` AND the analyzer returned
            a minimal contract metadata shape (bytecode only). UIs should show "overview only"
            copy in this case rather than treating absence of activity as no-activity.

    CategoryEnum:
      type: string
      description: Counterparty category from label database
      enum:
        - exchange
        - dex
        - defi
        - bridge
        - otc
        - mev_bot
        - instant_exchange
        - phishing
        - mixer
        - scam
        - exploit
        - sanctioned
        - frozen
        - custodian
        - fiat_ramp
        - payment_processor
        - unknown

    FlagDetail:
      type: object
      required: [code, templateKey, defaultEn]
      description: |
        Localization-friendly flag metadata. Use `code` / `templateKey` for
        translation/mapping. `defaultEn` is a display fallback only — it
        may include dynamic values and is not stable across releases.
        Pattern flags use the `pattern.*` namespace; bot flags (under
        `timing.botFlagDetails`) use the `bot.*` namespace.
      properties:
        code:
          type: string
          description: Stable machine-readable identifier. Use this for translation/mapping.
          example: bulk_collection
        templateKey:
          type: string
          description: Namespaced i18n key. `pattern.<code>` for pattern flags, `bot.<code>` for bot flags.
          example: pattern.bulk_collection
        defaultEn:
          type: string
          description: Current English display fallback. May include dynamic values. Do not use as translation key.
          example: "BULK COLLECTION pattern: 24 inbound TXs in 600s"
        severity:
          type: string
          enum: [critical, high, medium, low]
          nullable: true
          example: medium
        description:
          type: string
          nullable: true
          description: Short stable English explanation of the flag meaning.
          example: "Many sources sent funds within a short window (bulk collection)."

    AddressConnection:
      type: object
      description: Aggregated interaction volume for a single counterparty category
      required: [category, percentage, valueFormatted, valueRaw, unit]
      properties:
        category:
          $ref: '#/components/schemas/CategoryEnum'
        percentage:
          type: number
          description: "Percentage of total interaction volume (0.0–100.0)"
          example: 64.0
        valueFormatted:
          type: string
          description: "Human-readable value with network unit (display-only)"
          example: "15,000 TRX"
        valueRaw:
          type: string
          description: "Raw value in network base units (wei, sun, satoshi, etc.) for programmatic use"
          example: "15000000000"
        unit:
          type: string
          description: "Base unit name for the network (wei, sun, satoshi, lovelace, etc.)"
          example: "sun"

    GraphSnapshot:
      type: object
      description: Graph snapshot metadata (no graphData payload)
      required: [id, reportId, name, nodeCount, edgeCount, createdAt, updatedAt]
      properties:
        id: { type: integer, example: 42 }
        reportId: { type: string, description: "Report public_id" }
        name: { type: string, maxLength: 100, example: "After expanding counterparties" }
        description: { type: string, nullable: true, maxLength: 500 }
        nodeCount: { type: integer, description: "Computed server-side from graphData.nodes" }
        edgeCount: { type: integer, description: "Computed server-side from graphData.edges" }
        createdAt: { type: integer, description: "Unix timestamp (seconds)" }
        updatedAt: { type: integer, description: "Unix timestamp (seconds)" }

    GraphSnapshotFull:
      allOf:
        - $ref: '#/components/schemas/GraphSnapshot'
        - type: object
          required: [graphData]
          properties:
            graphData:
              type: object
              required: [nodes, edges]
              properties:
                nodes: { type: array, items: { type: object } }
                edges: { type: array, items: { type: object } }
